<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generation Health</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --cream: #FDF8F2;
    --warm-white: #FFFCF8;
    --blush: #F5E6D8;
    --terracotta: #C8714A;
    --terracotta-light: #E8956E;
    --terracotta-pale: #F5D4C2;
    --deep: #2C1810;
    --mid: #6B4C3B;
    --light: #B8967E;
    --border: rgba(200, 113, 74, 0.15);
    --shadow: rgba(44, 24, 16, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--deep);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(245, 230, 216, 0.6) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(168, 197, 171, 0.2) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── AUTH ─── */
  #auth-screen {
    position: fixed;
    inset: 0;
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--cream);
  }

  .auth-card {
    background: white;
    border-radius: 28px;
    padding: 40px 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(44, 24, 16, 0.12);
    border: 1px solid var(--border);
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s ease both;
  }

  .auth-brand {
    text-align: center;
    margin-bottom: 32px;
  }

  .auth-brand-icon { font-size: 40px; margin-bottom: 12px; display: block; }

  .auth-brand-label {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--light);
    margin-bottom: 6px;
  }

  .auth-brand-title {
    font-family: 'DM Serif Display', serif;
    font-size: 30px;
    color: var(--deep);
  }

  .auth-brand-title em { color: var(--terracotta); font-style: italic; }

  .auth-tabs {
    display: flex;
    gap: 4px;
    background: var(--blush);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 28px;
  }

  .auth-tab {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 9px;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--light);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .auth-tab.active {
    background: white;
    color: var(--deep);
    box-shadow: 0 2px 8px var(--shadow);
  }

  .auth-error {
    background: #FFF0EC;
    border: 1px solid #FFCBB8;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--terracotta);
    margin-bottom: 16px;
    display: none;
  }

  .auth-form-group { margin-bottom: 16px; }

  .auth-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--light);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .auth-input {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--border);
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--deep);
    background: var(--warm-white);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .auth-input:focus { border-color: var(--terracotta); }

  .auth-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--terracotta) 0%, var(--terracotta-light) 100%);
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    box-shadow: 0 4px 16px rgba(200, 113, 74, 0.3);
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s;
  }

  .auth-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200, 113, 74, 0.4); }
  .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* ─── TOP BAR ─── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 0;
    position: relative;
    z-index: 1;
  }

  .topbar-brand {
    font-family: 'DM Serif Display', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--light);
  }

  .user-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 10px 6px 6px;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .user-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--terracotta) 0%, var(--terracotta-light) 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: white; font-weight: 600;
  }

  .user-email-short {
    font-size: 12px; color: var(--mid); font-weight: 500;
    max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .logout-btn {
    background: none; border: none; color: var(--light); cursor: pointer;
    font-size: 11px; font-family: 'DM Sans', sans-serif; font-weight: 500;
    padding: 2px 4px; transition: color 0.2s;
  }

  .logout-btn:hover { color: var(--terracotta); }

  /* ─── APP ─── */
  #app-screen { display: none; }

  header {
    padding: 20px 20px 24px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .page-title { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--deep); line-height: 1.1; }
  .page-title em { color: var(--terracotta); font-style: italic; }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px 120px;
    position: relative;
    z-index: 1;
  }

  .stats-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: white;
    border-radius: 16px;
    padding: 16px 12px;
    text-align: center;
    border: 1px solid var(--border);
    box-shadow: 0 2px 12px var(--shadow);
    animation: fadeUp 0.4s ease both;
  }

  .stat-card:nth-child(2) { animation-delay: 0.05s; }
  .stat-card:nth-child(3) { animation-delay: 0.1s; }

  .stat-number { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--terracotta); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 11px; color: var(--light); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }

  .next-card {
    background: linear-gradient(135deg, var(--terracotta) 0%, var(--terracotta-light) 100%);
    border-radius: 20px;
    padding: 20px 24px;
    margin-bottom: 28px;
    color: white;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(200, 113, 74, 0.3);
    animation: fadeUp 0.4s ease 0.15s both;
  }

  .next-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }

  .next-card-label { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.8; margin-bottom: 8px; }
  .next-time { font-family: 'DM Serif Display', serif; font-size: 42px; line-height: 1; margin-bottom: 4px; }
  .next-sub { font-size: 13px; opacity: 0.75; }

  .next-chip {
    position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; padding: 8px 14px; text-align: center;
  }

  .next-chip-time { font-family: 'DM Serif Display', serif; font-size: 18px; display: block; }
  .next-chip-label { font-size: 10px; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.05em; }

  .section-title {
    font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--deep);
    margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;
  }

  .section-title span { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--light); font-weight: 500; }

  .schedule-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 28px; }

  .schedule-slot {
    background: white; border-radius: 12px; padding: 12px 8px; text-align: center;
    border: 1px solid var(--border); box-shadow: 0 2px 6px var(--shadow); position: relative; transition: all 0.2s ease;
  }

  .schedule-slot.done { background: var(--blush); border-color: var(--terracotta-pale); }
  .schedule-slot.next { background: var(--terracotta); border-color: var(--terracotta); box-shadow: 0 4px 16px rgba(200, 113, 74, 0.3); }
  .schedule-slot.next .slot-time, .schedule-slot.next .slot-label { color: white; }

  .slot-time { font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--deep); margin-bottom: 2px; }
  .slot-label { font-size: 10px; color: var(--light); text-transform: uppercase; letter-spacing: 0.05em; }

  .slot-check {
    position: absolute; top: 6px; right: 6px; width: 16px; height: 16px;
    border-radius: 50%; background: var(--terracotta);
    display: flex; align-items: center; justify-content: center; font-size: 9px; color: white;
  }

  .feeding-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

  .feeding-item {
    background: white; border-radius: 16px; padding: 16px 20px;
    display: flex; align-items: center; gap: 16px;
    border: 1px solid var(--border); box-shadow: 0 2px 8px var(--shadow);
    animation: fadeUp 0.3s ease both; transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .feeding-item:hover { transform: translateY(-1px); box-shadow: 0 4px 16px var(--shadow); }

  .feeding-icon {
    width: 44px; height: 44px; border-radius: 12px; background: var(--blush);
    display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
  }

  .feeding-info { flex: 1; }
  .feeding-time { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--deep); line-height: 1; margin-bottom: 3px; }
  .feeding-details { font-size: 13px; color: var(--light); }
  .feeding-amount { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--terracotta); }
  .feeding-amount span { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--light); }

  .delete-btn {
    width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent;
    color: var(--light); cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: background 0.2s, color 0.2s;
  }

  .delete-btn:hover { background: #FFF0E8; color: var(--terracotta); }

  .loading-state { text-align: center; padding: 32px; color: var(--light); font-size: 14px; }

  .spinner {
    width: 24px; height: 24px; border: 2px solid var(--border);
    border-top-color: var(--terracotta); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--light); }
  .empty-state-icon { font-size: 48px; margin-bottom: 12px; display: block; opacity: 0.5; }
  .empty-state-text { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--mid); margin-bottom: 6px; }
  .empty-state-sub { font-size: 13px; }

  .fab {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, var(--terracotta) 0%, var(--terracotta-light) 100%);
    color: white; border: none; border-radius: 20px; padding: 16px 32px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer;
    box-shadow: 0 8px 24px rgba(200, 113, 74, 0.4);
    display: flex; align-items: center; gap: 10px; white-space: nowrap;
    transition: transform 0.2s ease, box-shadow 0.2s ease; z-index: 100;
  }

  .fab:hover { transform: translateX(-50%) translateY(-2px); box-shadow: 0 12px 32px rgba(200, 113, 74, 0.5); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(44, 24, 16, 0.4); backdrop-filter: blur(8px);
    z-index: 200; display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--warm-white); border-radius: 28px 28px 0 0; padding: 32px 24px 48px;
    width: 100%; max-width: 480px; transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 24px; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--deep); margin-bottom: 24px; }

  .form-group { margin-bottom: 20px; }

  .form-label {
    display: block; font-size: 12px; font-weight: 600; color: var(--light);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
  }

  .form-input {
    width: 100%; padding: 14px 18px; border: 2px solid var(--border); border-radius: 14px;
    font-family: 'DM Sans', sans-serif; font-size: 16px; color: var(--deep);
    background: white; outline: none; transition: border-color 0.2s; -webkit-appearance: none;
  }

  .form-input:focus { border-color: var(--terracotta); }

  .amount-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

  .amount-btn {
    padding: 12px 8px; border: 2px solid var(--border); border-radius: 12px; background: white;
    font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--deep);
    cursor: pointer; text-align: center; transition: all 0.15s ease;
  }

  .amount-btn span { display: block; font-family: 'DM Sans', sans-serif; font-size: 10px; color: var(--light); margin-top: 1px; }
  .amount-btn.selected { border-color: var(--terracotta); background: var(--blush); color: var(--terracotta); }
  .amount-btn:hover:not(.selected) { border-color: var(--terracotta-pale); }

  .custom-amount-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .custom-amount-row .form-input { flex: 1; }

  .submit-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--terracotta) 0%, var(--terracotta-light) 100%);
    color: white; border: none; border-radius: 16px;
    font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600;
    cursor: pointer; margin-top: 24px;
    box-shadow: 0 4px 16px rgba(200, 113, 74, 0.3);
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s;
  }

  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200, 113, 74, 0.4); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .toast {
    position: fixed; top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--deep); color: white; padding: 12px 20px; border-radius: 12px;
    font-size: 14px; font-weight: 500; z-index: 300;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="auth-brand-icon">🍼</span>
      <div class="auth-brand-label">Bienvenue sur</div>
      <div class="auth-brand-title">Generation <em>Health</em></div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Connexion</button>
      <button class="auth-tab" onclick="switchTab('signup')">Inscription</button>
    </div>

    <div class="auth-error" id="auth-error"></div>

    <div class="auth-form-group">
      <label class="auth-label">Email</label>
      <input type="email" class="auth-input" id="auth-email" placeholder="vous@email.com" autocomplete="email">
    </div>

    <div class="auth-form-group">
      <label class="auth-label">Mot de passe</label>
      <input type="password" class="auth-input" id="auth-password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="auth-form-group" id="confirm-group" style="display:none;">
      <label class="auth-label">Confirmer le mot de passe</label>
      <input type="password" class="auth-input" id="auth-confirm" placeholder="••••••••">
    </div>

    <button class="auth-btn" id="auth-submit-btn" onclick="handleAuth()">Se connecter</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-brand">Generation Health</div>
    <div class="user-badge">
      <div class="user-avatar" id="user-avatar">?</div>
      <span class="user-email-short" id="user-email-display"></span>
      <button class="logout-btn" onclick="handleLogout()">Déco</button>
    </div>
  </div>

  <header>
    <h1 class="page-title">Suivi <em>biberons</em></h1>
  </header>

  <div class="container">
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-number" id="stat-count">0</div>
        <div class="stat-label">aujourd'hui</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-total">0</div>
        <div class="stat-label">ml total</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-avg">—</div>
        <div class="stat-label">ml moyen</div>
      </div>
    </div>

    <div class="next-card">
      <div class="next-card-label">⏰ Prochain biberon</div>
      <div class="next-time" id="next-time">—:——</div>
      <div class="next-sub" id="next-sub">Enregistrez le premier biberon</div>
      <div class="next-chip">
        <span class="next-chip-time" id="countdown-val">—</span>
        <span class="next-chip-label">restant</span>
      </div>
    </div>

    <div class="section-title">Planning du jour <span id="schedule-interval-label">toutes les 3h</span></div>
    <div class="schedule-grid" id="schedule-grid"></div>

    <div class="section-title">
      Biberons du jour
      <span id="list-date"></span>
    </div>

    <div class="feeding-list" id="feeding-list">
      <div class="loading-state" id="loading-state">
        <div class="spinner"></div>
        Chargement…
      </div>
    </div>
  </div>
</div>

<button class="fab" id="fab" onclick="openModal()" style="display:none;">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
  Enregistrer un biberon
</button>

<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nouveau biberon 🍼</div>

    <div class="form-group">
      <label class="form-label">Heure du biberon</label>
      <input type="time" class="form-input" id="input-time">
    </div>

    <div class="form-group">
      <label class="form-label">Quantité</label>
      <div class="amount-grid">
        <button class="amount-btn" onclick="selectAmount(60, this)">60<span>ml</span></button>
        <button class="amount-btn" onclick="selectAmount(90, this)">90<span>ml</span></button>
        <button class="amount-btn" onclick="selectAmount(120, this)">120<span>ml</span></button>
        <button class="amount-btn" onclick="selectAmount(150, this)">150<span>ml</span></button>
        <button class="amount-btn" onclick="selectAmount(180, this)">180<span>ml</span></button>
        <button class="amount-btn" onclick="selectAmount(210, this)">210<span>ml</span></button>
        <button class="amount-btn" onclick="selectAmount(240, this)">240<span>ml</span></button>
        <button class="amount-btn" id="custom-btn" onclick="toggleCustom()">Autre<span>ml</span></button>
      </div>
      <div class="custom-amount-row" id="custom-row" style="display:none;">
        <input type="number" class="form-input" id="custom-amount" placeholder="ex: 165" min="10" max="400" oninput="selectCustomAmount()">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Intervalle prochain biberon</label>
      <select class="form-input" id="input-interval">
        <option value="2">Toutes les 2h</option>
        <option value="2.5">Toutes les 2h30</option>
        <option value="3" selected>Toutes les 3h</option>
        <option value="3.5">Toutes les 3h30</option>
        <option value="4">Toutes les 4h</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Note (optionnel)</label>
      <input type="text" class="form-input" id="input-note" placeholder="ex: a bien bu, un peu agité...">
    </div>

    <button class="submit-btn" id="save-btn" onclick="saveFeeding()">Enregistrer</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://ihyvcsniufcvjynctqhb.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloeXZjc25pdWZjdmp5bmN0cWhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MzI1NjYsImV4cCI6MjA5MDQwODU2Nn0.7BwuLhJnwKIM7U2_XTICLkyfjuDXKrZQHuS9eZlBC5c';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;
  let feedings = [];
  let selectedAmount = null;
  let authMode = 'login';

  // ─── BOOT ───
  async function boot() {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) { currentUser = session.user; showApp(); }

    sb.auth.onAuthStateChange((_e, session) => {
      if (session?.user) { currentUser = session.user; showApp(); }
      else { currentUser = null; showAuth(); }
    });
  }

  // ─── AUTH ───
  function switchTab(mode) {
    authMode = mode;
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (mode === 'login' && i === 0) || (mode === 'signup' && i === 1));
    });
    document.getElementById('confirm-group').style.display = mode === 'signup' ? 'block' : 'none';
    document.getElementById('auth-submit-btn').textContent = mode === 'login' ? 'Se connecter' : "S'inscrire";
    document.getElementById('auth-error').style.display = 'none';
  }

  async function handleAuth() {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const confirm = document.getElementById('auth-confirm').value;
    const btn = document.getElementById('auth-submit-btn');

    document.getElementById('auth-error').style.display = 'none';
    if (!email || !password) { showAuthError('Veuillez remplir tous les champs.'); return; }
    if (authMode === 'signup' && password !== confirm) { showAuthError('Les mots de passe ne correspondent pas.'); return; }
    if (password.length < 6) { showAuthError('Mot de passe trop court (min. 6 caractères).'); return; }

    btn.disabled = true;
    btn.textContent = authMode === 'login' ? 'Connexion…' : 'Inscription…';

    let error;
    if (authMode === 'login') {
      ({ error } = await sb.auth.signInWithPassword({ email, password }));
    } else {
      ({ error } = await sb.auth.signUp({ email, password }));
    }

    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Se connecter' : "S'inscrire";

    if (error) {
      const msg = error.message.includes('Invalid login') ? 'Email ou mot de passe incorrect.'
        : error.message.includes('already registered') ? 'Ce compte existe déjà. Connectez-vous.'
        : error.message;
      showAuthError(msg);
    }
  }

  function showAuthError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function handleLogout() {
    await sb.auth.signOut();
    feedings = [];
  }

  // ─── SCREENS ───
  function showAuth() {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('fab').style.display = 'none';
  }

  async function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('fab').style.display = 'flex';

    const email = currentUser.email;
    document.getElementById('user-email-display').textContent = email;
    document.getElementById('user-avatar').textContent = email[0].toUpperCase();
    document.getElementById('list-date').textContent = formatDate(new Date());

    await loadFeedings();
    setTimeDefault();
    updateCountdown();
    setInterval(updateCountdown, 30000);
  }

  // ─── DATA ───
  function getToday() { return new Date().toISOString().split('T')[0]; }
  function formatDate(d) { return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }); }

  async function loadFeedings() {
    document.getElementById('loading-state').style.display = 'block';
    const { data, error } = await sb.from('feedings').select('*')
      .eq('date', getToday()).eq('user_id', currentUser.id).order('timestamp', { ascending: false });
    document.getElementById('loading-state').style.display = 'none';
    if (error) { showToast('⚠️ Erreur de chargement'); return; }
    feedings = data || [];
    renderAll();
  }

  async function saveFeeding() {
    const timeVal = document.getElementById('input-time').value;
    if (!timeVal) { showToast("⚠️ Veuillez saisir l'heure"); return; }
    if (!selectedAmount || selectedAmount < 10) { showToast('⚠️ Veuillez sélectionner une quantité'); return; }

    const [hh, mm] = timeVal.split(':').map(Number);
    const now = new Date();
    const feedingDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hh, mm, 0);
    const interval = parseFloat(document.getElementById('input-interval').value);
    const note = document.getElementById('input-note').value.trim();

    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Enregistrement…';

    try {
      const { data, error } = await sb.from('feedings').insert([{
        user_id: currentUser.id,
        date: getToday(),
        time: timeVal,
        timestamp: feedingDate.getTime(),
        amount: selectedAmount,
        interval_hours: interval,
        note: note || null
      }]).select().single();

      if (error) throw error;
      feedings.unshift(data);
      renderAll();
      closeModal();
      showToast(`✓ Biberon de ${selectedAmount}ml enregistré à ${timeVal}`);
    } catch (e) {
      showToast("⚠️ Erreur lors de l'enregistrement");
    } finally {
      btn.disabled = false;
      btn.textContent = 'Enregistrer';
    }
  }

  async function deleteFeeding(id) {
    const { error } = await sb.from('feedings').delete().eq('id', id).eq('user_id', currentUser.id);
    if (error) { showToast('⚠️ Erreur de suppression'); return; }
    feedings = feedings.filter(f => f.id !== id);
    renderAll();
    showToast('Biberon supprimé');
  }

  // ─── RENDER ───
  function renderAll() { renderStats(); renderList(); renderNextFeeding(); renderSchedule(); }

  function renderStats() {
    const total = feedings.reduce((s, f) => s + f.amount, 0);
    const avg = feedings.length > 0 ? Math.round(total / feedings.length) : null;
    document.getElementById('stat-count').textContent = feedings.length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-avg').textContent = avg || '—';
  }

  function renderList() {
    const list = document.getElementById('feeding-list');
    list.querySelectorAll('.feeding-item, .empty-state').forEach(el => el.remove());

    if (feedings.length === 0) {
      list.innerHTML += `<div class="empty-state">
        <span class="empty-state-icon">🍼</span>
        <div class="empty-state-text">Aucun biberon enregistré</div>
        <div class="empty-state-sub">Appuyez sur le bouton + pour commencer</div>
      </div>`;
      return;
    }

    [...feedings].sort((a, b) => b.timestamp - a.timestamp).forEach((f, i) => {
      const item = document.createElement('div');
      item.className = 'feeding-item';
      item.style.animationDelay = `${i * 0.06}s`;
      item.innerHTML = `
        <div class="feeding-icon">🍼</div>
        <div class="feeding-info">
          <div class="feeding-time">${f.time}</div>
          <div class="feeding-details">${f.note || 'Biberon enregistré'}</div>
        </div>
        <div class="feeding-amount">${f.amount}<span>ml</span></div>
        <button class="delete-btn" onclick="deleteFeeding('${f.id}')" title="Supprimer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>`;
      list.appendChild(item);
    });
  }

  function renderNextFeeding() {
    if (feedings.length === 0) {
      document.getElementById('next-time').textContent = '—:——';
      document.getElementById('next-sub').textContent = 'Enregistrez le premier biberon';
      document.getElementById('countdown-val').textContent = '—';
      return;
    }
    const last = feedings.reduce((a, b) => a.timestamp > b.timestamp ? a : b);
    const nextDate = new Date(last.timestamp + (last.interval_hours || 3) * 3600000);
    const hh = String(nextDate.getHours()).padStart(2, '0');
    const mm = String(nextDate.getMinutes()).padStart(2, '0');
    document.getElementById('next-time').textContent = `${hh}:${mm}`;
    document.getElementById('next-sub').textContent = `Intervalle de ${intervalLabel(last.interval_hours || 3)} depuis ${last.time}`;
    updateCountdown();
  }

  function updateCountdown() {
    if (feedings.length === 0) return;
    const last = feedings.reduce((a, b) => a.timestamp > b.timestamp ? a : b);
    const diff = (last.timestamp + (last.interval_hours || 3) * 3600000) - Date.now();
    const el = document.getElementById('countdown-val');
    if (diff <= 0) {
      el.textContent = '!';
      document.getElementById('next-sub').textContent = '⚠️ Heure du biberon !';
    } else {
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      el.textContent = h > 0 ? `${h}h${String(m).padStart(2, '0')}` : `${m}min`;
    }
  }

  function renderSchedule() {
    const grid = document.getElementById('schedule-grid');
    grid.innerHTML = '';

    if (feedings.length === 0) {
      ['06:00','09:00','12:00','15:00','18:00','21:00','00:00','03:00'].forEach(t => {
        grid.innerHTML += `<div class="schedule-slot"><div class="slot-time">${t}</div><div class="slot-label">prévu</div></div>`;
      });
      return;
    }

    const sorted = [...feedings].sort((a, b) => a.timestamp - b.timestamp);
    const last = feedings.reduce((a, b) => a.timestamp > b.timestamp ? a : b);
    const intervalMs = (last.interval_hours || 3) * 3600000;
    const now = Date.now();
    let ts = sorted[0].timestamp;

    for (let i = 0; i < 8; i++) {
      const d = new Date(ts);
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      const isDone = feedings.some(f => Math.abs(f.timestamp - ts) < 30 * 60000);
      const isNext = !isDone && ts > now && (ts - now) < intervalMs;

      const slot = document.createElement('div');
      slot.className = `schedule-slot${isDone ? ' done' : ''}${isNext ? ' next' : ''}`;
      slot.innerHTML = `
        <div class="slot-time">${hh}:${mm}</div>
        <div class="slot-label">${isDone ? 'fait' : isNext ? 'prochain' : 'prévu'}</div>
        ${isDone ? '<div class="slot-check">✓</div>' : ''}`;
      grid.appendChild(slot);
      ts += intervalMs;
    }

    document.getElementById('schedule-interval-label').textContent = `toutes les ${intervalLabel(last.interval_hours || 3)}`;
  }

  function intervalLabel(v) {
    return v === 2 ? '2h' : v === 2.5 ? '2h30' : v === 3 ? '3h' : v === 3.5 ? '3h30' : '4h';
  }

  // ─── MODAL ───
  function openModal() {
    setTimeDefault();
    selectedAmount = null;
    document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('input-note').value = '';
    document.getElementById('custom-row').style.display = 'none';
    document.getElementById('custom-amount').value = '';
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() { document.getElementById('modal').classList.remove('open'); }
  function handleOverlayClick(e) { if (e.target === document.getElementById('modal')) closeModal(); }

  function selectAmount(val, btn) {
    selectedAmount = val;
    document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('custom-row').style.display = 'none';
  }

  function toggleCustom() {
    selectedAmount = null;
    document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('custom-btn').classList.add('selected');
    const row = document.getElementById('custom-row');
    row.style.display = row.style.display === 'none' ? 'flex' : 'none';
    if (row.style.display === 'flex') document.getElementById('custom-amount').focus();
  }

  function selectCustomAmount() {
    const val = parseInt(document.getElementById('custom-amount').value);
    selectedAmount = isNaN(val) ? null : val;
  }

  function setTimeDefault() {
    const now = new Date();
    document.getElementById('input-time').value =
      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('auth-screen').style.display !== 'none') handleAuth();
  });

  boot();
</script>
</body>
</html>
