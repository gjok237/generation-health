<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generation Health — Biberons</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FDF8F2;
    --warm-white: #FFFCF8;
    --blush: #F5E6D8;
    --terracotta: #C8714A;
    --terracotta-light: #E8956E;
    --terracotta-pale: #F5D4C2;
    --sage: #7A9E7E;
    --sage-light: #A8C5AB;
    --deep: #2C1810;
    --mid: #6B4C3B;
    --light: #B8967E;
    --border: rgba(200, 113, 74, 0.15);
    --shadow: rgba(44, 24, 16, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--deep);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(245, 230, 216, 0.6) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(168, 197, 171, 0.2) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px 120px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 40px 20px 24px;
    text-align: center;
    position: relative;
  }

  .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--light);
    margin-bottom: 6px;
  }

  .page-title {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--deep);
    line-height: 1.1;
  }

  .page-title em {
    color: var(--terracotta);
    font-style: italic;
  }

  /* Date strip */
  .date-strip {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    margin-bottom: 8px;
  }

  .date-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--light);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .date-value {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--deep);
  }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    padding: 0 20px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: white;
    border-radius: 16px;
    padding: 16px 12px;
    text-align: center;
    border: 1px solid var(--border);
    box-shadow: 0 2px 12px var(--shadow);
    animation: fadeUp 0.4s ease both;
  }

  .stat-card:nth-child(2) { animation-delay: 0.05s; }
  .stat-card:nth-child(3) { animation-delay: 0.1s; }

  .stat-number {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--terracotta);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--light);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Next feeding card */
  .next-card {
    background: linear-gradient(135deg, var(--terracotta) 0%, var(--terracotta-light) 100%);
    border-radius: 20px;
    padding: 20px 24px;
    margin: 0 20px 28px;
    color: white;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(200, 113, 74, 0.3);
    animation: fadeUp 0.4s ease 0.15s both;
  }

  .next-card::before {
    content: '';
    position: absolute;
    top: -30px;
    right: -30px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }

  .next-card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 8px;
  }

  .next-time {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .next-sub {
    font-size: 13px;
    opacity: 0.75;
  }

  .next-chip {
    position: absolute;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 12px;
    padding: 8px 14px;
    text-align: center;
  }

  .next-chip-time {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    display: block;
  }

  .next-chip-label {
    font-size: 10px;
    opacity: 0.8;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Section title */
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--deep);
    padding: 0 20px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-title span {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--light);
    font-weight: 500;
  }

  /* Feeding list */
  .feeding-list {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }

  .feeding-item {
    background: white;
    border-radius: 16px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px var(--shadow);
    animation: fadeUp 0.3s ease both;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .feeding-item:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px var(--shadow);
  }

  .feeding-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--blush);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .feeding-info {
    flex: 1;
  }

  .feeding-time {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--deep);
    line-height: 1;
    margin-bottom: 3px;
  }

  .feeding-details {
    font-size: 13px;
    color: var(--light);
  }

  .feeding-amount {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--terracotta);
    font-weight: 400;
  }

  .feeding-amount span {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--light);
  }

  .delete-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--light);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: background 0.2s, color 0.2s;
  }

  .delete-btn:hover {
    background: #FFF0E8;
    color: var(--terracotta);
  }

  /* Schedule */
  .schedule-section {
    padding: 0 20px;
    margin-bottom: 28px;
  }

  .schedule-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .schedule-slot {
    background: white;
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
    border: 1px solid var(--border);
    box-shadow: 0 2px 6px var(--shadow);
    position: relative;
    transition: all 0.2s ease;
  }

  .schedule-slot.done {
    background: var(--blush);
    border-color: var(--terracotta-pale);
  }

  .schedule-slot.next {
    background: var(--terracotta);
    border-color: var(--terracotta);
    box-shadow: 0 4px 16px rgba(200, 113, 74, 0.3);
  }

  .schedule-slot.next .slot-time,
  .schedule-slot.next .slot-label {
    color: white;
  }

  .slot-time {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--deep);
    margin-bottom: 2px;
  }

  .slot-label {
    font-size: 10px;
    color: var(--light);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .slot-check {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--terracotta);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: white;
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, var(--terracotta) 0%, var(--terracotta-light) 100%);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 16px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(200, 113, 74, 0.4);
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    z-index: 100;
  }

  .fab:hover {
    transform: translateX(-50%) translateY(-2px);
    box-shadow: 0 12px 32px rgba(200, 113, 74, 0.5);
  }

  .fab:active {
    transform: translateX(-50%) translateY(0);
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44, 24, 16, 0.4);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--warm-white);
    border-radius: 28px 28px 0 0;
    padding: 32px 24px 48px;
    width: 100%;
    max-width: 480px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 24px;
  }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: var(--deep);
    margin-bottom: 24px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--light);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--border);
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--deep);
    background: white;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .form-input:focus {
    border-color: var(--terracotta);
  }

  /* Amount selector */
  .amount-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .amount-btn {
    padding: 12px 8px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: white;
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--deep);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s ease;
  }

  .amount-btn span {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    color: var(--light);
    margin-top: 1px;
  }

  .amount-btn.selected {
    border-color: var(--terracotta);
    background: var(--blush);
    color: var(--terracotta);
  }

  .amount-btn:hover:not(.selected) {
    border-color: var(--terracotta-pale);
  }

  /* Custom amount */
  .custom-amount-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }

  .custom-amount-row .form-input {
    flex: 1;
  }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--terracotta) 0%, var(--terracotta-light) 100%);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 24px;
    box-shadow: 0 4px 16px rgba(200, 113, 74, 0.3);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .submit-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(200, 113, 74, 0.4);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--light);
  }

  .empty-state-icon {
    font-size: 48px;
    margin-bottom: 12px;
    display: block;
    opacity: 0.5;
  }

  .empty-state-text {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--mid);
    margin-bottom: 6px;
  }

  .empty-state-sub {
    font-size: 13px;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--deep);
    color: white;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    z-index: 300;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .no-feedings {
    display: none;
  }
</style>
</head>
<body>

<header>
  <div class="brand">Generation Health</div>
  <h1 class="page-title">Suivi <em>biberons</em></h1>
</header>

<div class="container">

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-number" id="stat-count">0</div>
      <div class="stat-label">aujourd'hui</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-total">0</div>
      <div class="stat-label">ml total</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-avg">—</div>
      <div class="stat-label">ml moyen</div>
    </div>
  </div>

  <!-- Next feeding -->
  <div class="next-card" id="next-card">
    <div class="next-card-label">⏰ Prochain biberon</div>
    <div class="next-time" id="next-time">—:——</div>
    <div class="next-sub" id="next-sub">Enregistrez le premier biberon</div>
    <div class="next-chip" id="next-countdown">
      <span class="next-chip-time" id="countdown-val">—</span>
      <span class="next-chip-label">restant</span>
    </div>
  </div>

  <!-- Schedule -->
  <div class="schedule-section">
    <div class="section-title" style="padding:0; margin-bottom:12px;">Planning du jour <span id="schedule-interval-label">toutes les 3h</span></div>
    <div class="schedule-grid" id="schedule-grid"></div>
  </div>

  <!-- Feeding list -->
  <div class="section-title">
    Biberons du jour
    <span id="list-date"></span>
  </div>
  <div class="feeding-list" id="feeding-list">
    <div class="empty-state" id="empty-state">
      <span class="empty-state-icon">🍼</span>
      <div class="empty-state-text">Aucun biberon enregistré</div>
      <div class="empty-state-sub">Appuyez sur le bouton + pour commencer</div>
    </div>
  </div>

</div>

<!-- FAB -->
<button class="fab" onclick="openModal()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
  Enregistrer un biberon
</button>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nouveau biberon 🍼</div>

    <div class="form-group">
      <label class="form-label">Heure du biberon</label>
      <input type="time" class="form-input" id="input-time">
    </div>

    <div class="form-group">
      <label class="form-label">Quantité</label>
      <div class="amount-grid">
        <button class="amount-btn" onclick="selectAmount(60)">60<span>ml</span></button>
        <button class="amount-btn" onclick="selectAmount(90)">90<span>ml</span></button>
        <button class="amount-btn" onclick="selectAmount(120)">120<span>ml</span></button>
        <button class="amount-btn" onclick="selectAmount(150)">150<span>ml</span></button>
        <button class="amount-btn" onclick="selectAmount(180)">180<span>ml</span></button>
        <button class="amount-btn" onclick="selectAmount(210)">210<span>ml</span></button>
        <button class="amount-btn" onclick="selectAmount(240)">240<span>ml</span></button>
        <button class="amount-btn" id="custom-btn" onclick="toggleCustom()">Autre<span>ml</span></button>
      </div>
      <div class="custom-amount-row" id="custom-row" style="display:none;">
        <input type="number" class="form-input" id="custom-amount" placeholder="ex: 165" min="10" max="400" oninput="selectCustomAmount()">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Intervalle prochain biberon</label>
      <select class="form-input" id="input-interval">
        <option value="2">Toutes les 2h</option>
        <option value="2.5">Toutes les 2h30</option>
        <option value="3" selected>Toutes les 3h</option>
        <option value="3.5">Toutes les 3h30</option>
        <option value="4">Toutes les 4h</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Note (optionnel)</label>
      <input type="text" class="form-input" id="input-note" placeholder="ex: a bien bu, un peu agité...">
    </div>

    <button class="submit-btn" onclick="saveFeeding()">Enregistrer</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // State
  let feedings = JSON.parse(localStorage.getItem('gh_feedings') || '[]');
  let selectedAmount = null;

  // Init
  function init() {
    // Clean old feedings (keep only today)
    const today = getToday();
    feedings = feedings.filter(f => f.date === today);

    setTimeDefault();
    renderAll();
    updateCountdown();
    setInterval(updateCountdown, 30000);

    // Date label
    document.getElementById('list-date').textContent = formatDate(new Date());
  }

  function getToday() {
    return new Date().toISOString().split('T')[0];
  }

  function formatDate(d) {
    return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  }

  function setTimeDefault() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('input-time').value = `${hh}:${mm}`;
  }

  // Save
  function save() {
    localStorage.setItem('gh_feedings', JSON.stringify(feedings));
  }

  // Render
  function renderAll() {
    renderStats();
    renderList();
    renderNextFeeding();
    renderSchedule();
  }

  function renderStats() {
    const count = feedings.length;
    const total = feedings.reduce((s, f) => s + f.amount, 0);
    const avg = count > 0 ? Math.round(total / count) : null;

    document.getElementById('stat-count').textContent = count;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-avg').textContent = avg ? avg : '—';
  }

  function renderList() {
    const list = document.getElementById('feeding-list');
    const empty = document.getElementById('empty-state');
    const sorted = [...feedings].sort((a, b) => b.timestamp - a.timestamp);

    // Remove existing items
    list.querySelectorAll('.feeding-item').forEach(el => el.remove());

    if (sorted.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    sorted.forEach((f, i) => {
      const item = document.createElement('div');
      item.className = 'feeding-item';
      item.style.animationDelay = `${i * 0.06}s`;
      item.innerHTML = `
        <div class="feeding-icon">🍼</div>
        <div class="feeding-info">
          <div class="feeding-time">${f.time}</div>
          <div class="feeding-details">${f.note ? f.note : 'Biberon enregistré'}</div>
        </div>
        <div class="feeding-amount">${f.amount}<span>ml</span></div>
        <button class="delete-btn" onclick="deleteFeeding(${f.id})" title="Supprimer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      `;
      list.appendChild(item);
    });
  }

  function renderNextFeeding() {
    const nextTimeEl = document.getElementById('next-time');
    const nextSubEl = document.getElementById('next-sub');

    if (feedings.length === 0) {
      nextTimeEl.textContent = '—:——';
      nextSubEl.textContent = 'Enregistrez le premier biberon';
      document.getElementById('countdown-val').textContent = '—';
      return;
    }

    const last = feedings.reduce((a, b) => a.timestamp > b.timestamp ? a : b);
    const interval = (last.interval || 3) * 60 * 60 * 1000;
    const nextTs = last.timestamp + interval;
    const nextDate = new Date(nextTs);

    const hh = String(nextDate.getHours()).padStart(2, '0');
    const mm = String(nextDate.getMinutes()).padStart(2, '0');
    nextTimeEl.textContent = `${hh}:${mm}`;

    const intervalLabel = last.interval === 2 ? '2h' : last.interval === 2.5 ? '2h30' : last.interval === 3 ? '3h' : last.interval === 3.5 ? '3h30' : '4h';
    nextSubEl.textContent = `Intervalle de ${intervalLabel} depuis ${last.time}`;

    updateCountdown();
  }

  function updateCountdown() {
    const countdownEl = document.getElementById('countdown-val');
    if (feedings.length === 0) return;

    const last = feedings.reduce((a, b) => a.timestamp > b.timestamp ? a : b);
    const interval = (last.interval || 3) * 60 * 60 * 1000;
    const nextTs = last.timestamp + interval;
    const diff = nextTs - Date.now();

    if (diff <= 0) {
      countdownEl.textContent = '!';
      document.getElementById('next-sub').textContent = '⚠️ Heure du biberon !';
    } else {
      const totalMin = Math.floor(diff / 60000);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      countdownEl.textContent = h > 0 ? `${h}h${String(m).padStart(2,'0')}` : `${m}min`;
    }
  }

  function renderSchedule() {
    const grid = document.getElementById('schedule-grid');
    grid.innerHTML = '';

    if (feedings.length === 0) {
      // Default schedule preview
      const defaultTimes = ['06:00', '09:00', '12:00', '15:00', '18:00', '21:00', '00:00', '03:00'];
      defaultTimes.forEach(t => {
        const slot = document.createElement('div');
        slot.className = 'schedule-slot';
        slot.innerHTML = `<div class="slot-time">${t}</div><div class="slot-label">prévu</div>`;
        grid.appendChild(slot);
      });
      return;
    }

    // Build from first feeding
    const sorted = [...feedings].sort((a, b) => a.timestamp - b.timestamp);
    const first = sorted[0];
    const lastInterval = (feedings.reduce((a, b) => a.timestamp > b.timestamp ? a : b).interval || 3);
    const intervalMs = lastInterval * 60 * 60 * 1000;

    const slots = [];
    let ts = first.timestamp;
    for (let i = 0; i < 8; i++) {
      slots.push(ts);
      ts += intervalMs;
    }

    const now = Date.now();

    slots.forEach(slotTs => {
      const d = new Date(slotTs);
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      const timeStr = `${hh}:${mm}`;

      const isDone = feedings.some(f => {
        const diff = Math.abs(f.timestamp - slotTs);
        return diff < 30 * 60 * 1000;
      });

      const isNext = !isDone && slotTs > now && (slotTs - now) < intervalMs;

      const slot = document.createElement('div');
      slot.className = `schedule-slot${isDone ? ' done' : ''}${isNext ? ' next' : ''}`;
      slot.innerHTML = `
        <div class="slot-time">${timeStr}</div>
        <div class="slot-label">${isDone ? 'fait' : isNext ? 'prochain' : 'prévu'}</div>
        ${isDone ? '<div class="slot-check">✓</div>' : ''}
      `;
      grid.appendChild(slot);
    });

    const intervalLabel = lastInterval === 2 ? '2h' : lastInterval === 2.5 ? '2h30' : lastInterval === 3 ? '3h' : lastInterval === 3.5 ? '3h30' : '4h';
    document.getElementById('schedule-interval-label').textContent = `toutes les ${intervalLabel}`;
  }

  // Modal
  function openModal() {
    setTimeDefault();
    selectedAmount = null;
    document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('input-note').value = '';
    document.getElementById('custom-row').style.display = 'none';
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  function selectAmount(val) {
    selectedAmount = val;
    document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
    document.getElementById('custom-row').style.display = 'none';
  }

  function toggleCustom() {
    selectedAmount = null;
    document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('custom-btn').classList.add('selected');
    const row = document.getElementById('custom-row');
    row.style.display = row.style.display === 'none' ? 'flex' : 'none';
    if (row.style.display === 'flex') document.getElementById('custom-amount').focus();
  }

  function selectCustomAmount() {
    const val = parseInt(document.getElementById('custom-amount').value);
    selectedAmount = isNaN(val) ? null : val;
  }

  function saveFeeding() {
    const timeVal = document.getElementById('input-time').value;
    if (!timeVal) { showToast('⚠️ Veuillez saisir l\'heure'); return; }
    if (!selectedAmount || selectedAmount < 10) { showToast('⚠️ Veuillez sélectionner une quantité'); return; }

    const [hh, mm] = timeVal.split(':').map(Number);
    const now = new Date();
    const feedingDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hh, mm, 0);

    const interval = parseFloat(document.getElementById('input-interval').value);
    const note = document.getElementById('input-note').value.trim();

    const feeding = {
      id: Date.now(),
      date: getToday(),
      time: timeVal,
      timestamp: feedingDate.getTime(),
      amount: selectedAmount,
      interval: interval,
      note: note
    };

    feedings.push(feeding);
    save();
    renderAll();
    closeModal();
    showToast(`✓ Biberon de ${selectedAmount}ml enregistré à ${timeVal}`);
  }

  function deleteFeeding(id) {
    feedings = feedings.filter(f => f.id !== id);
    save();
    renderAll();
    showToast('Biberon supprimé');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  init();
</script>
</body>
</html>
